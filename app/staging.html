<!doctype html>
<!--
  Blotterbook — STAGING surface (ADR-001 / A27).

  Unlike app/app.html and app/demo.html (still vanilla, generated from partials/ by
  build-includes.mjs), staging is the Svelte 5 proving ground: this page is a hand-authored
  Svelte mount point, NOT assembled from partials, so build-includes leaves it untouched (it
  carries no include markers). The Svelte app lives in app/staging-svelte/ and reuses the
  pure-logic core (compute/costModel/Store/adapters) verbatim (A29). Staging stays key-gated by
  functions/_middleware.js and uses an isolated IndexedDB (store.js keys the DB off data-mode).

  MIGRATION IN PROGRESS: the Svelte staging app currently renders the Overview (computed metrics);
  the remaining panels (calendar, performance curve, advanced stats, break-even, manage-data,
  journal) are ported incrementally under A27 before staging reaches parity and prod/demo migrate.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- S14: never send a Referer (the launch URL may carry a ?k= admin token); the token is
         also stripped from the address bar on load by the Svelte app. -->
    <meta name="referrer" content="no-referrer" />
    <link rel="stylesheet" href="../tokens.css" />
    <title>Blotterbook — Staging</title>
  </head>
  <body data-mode="staging">
    <div id="app"></div>
    <script type="module" src="./staging-svelte/main.js"></script>
  </body>
</html>
