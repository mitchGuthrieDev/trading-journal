name: CI

# Guards the project: the data manifest must match the data files, the unit/logic tests pass,
# ESLint is clean, the Vite build (ADR-001/A26) emits a complete dist/, and the Playwright render
# tests boot every surface (served from dist/) with no console errors. The drift gate
# (build-manifest committed) still proves the build-time tooling didn't leave the committed sources
# stale; dist/ itself is gitignored. (A69 retired the build-includes half — the nav/footer partials
# became Nav.svelte/Footer.svelte, so there is no longer any committed HTML generated from partials.)
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs: a new push to the same ref (PR branch) cancels the in-progress run so
# we don't burn CI minutes on stale commits. main pushes use the unique SHA in the group so they
# never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# CI only reads the checkout — keep the token least-privilege (version-bump.yml is the
# only workflow that needs contents: write, to push the bump commit).
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version   # single source of truth (also read by Cloudflare Pages)
          cache: npm

      - name: Install dev dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (tsc core + functions, svelte-check app + site)
        run: npm run typecheck

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Unit + logic tests (adapters / auth / version / flags / tax / demostore)
        run: npm run test:unit

      - name: Build (Vite → dist/)
        run: npm run build

      - name: Bundle size budget (/app/ surface)
        run: npm run size-budget

      - name: Deploy-contract + version-classification guard
        run: npm run check-deploy

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browser (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Render / e2e tests (boot every surface, zero console errors)
        run: npm run test:e2e

      - name: Regenerate data manifest
        run: node scripts/build-manifest.mjs

      - name: Fail if generated outputs are not committed
        run: |
          # Catch both modified tracked files and NEW untracked outputs (CH11). Dev-tooling
          # artifacts (node_modules, playwright-report, test-results) are gitignored, so a clean
          # tree here also proves the tooling never wrote into the shipped/committed files.
          if ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated files are stale or untracked. Run 'node scripts/build-manifest.mjs' and commit the result."
            git --no-pager status --short
            exit 1
          fi
