name: Version bump

# CH12 — after a merge to main, derive the two-track version bump from the merge commit's
# conventional-commit type + changed paths, write static/data/versions.json, sync the offline-fallback
# badge literals (B17), regenerate the app pages, and commit it all back. Runtime-fetch badges
# pick up versions.json live.

on:
  push:
    branches: [main]

permissions:
  contents: write

# Serialize bump runs so two close merges don't both compute from the same versions.json and
# race the push (which would silently drop a bump). Queue, don't cancel (CH14).
concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    # Don't bump our own release commit (belt-and-suspenders with the [skip ci] marker).
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # full history so `before..after` diffs resolve for any merge style

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version   # single source of truth (matches CI + Cloudflare Pages)

      # Apply the bump (re-derived from the latest main on each retry) and push it back. If the
      # push is rejected because another bump landed first, reset, pull, and recompute against the
      # now-current versions.json so no bump is lost (CH14).
      - name: Bump + commit + push
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Diff the exact pushed range (handles squash AND true merge commits), falling back to
          # HEAD~1 if `before` is unavailable. Computed once — the changeset doesn't change on retry.
          if git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          else
            CHANGED_FILES="$(git diff --name-only HEAD~1 HEAD || true)"
          fi
          export CHANGED_FILES COMMIT_MSG

          for attempt in 1 2 3 4 5; do
            git checkout -- . || true
            node scripts/bump-version.mjs
            if git diff --quiet; then
              echo "No version change to commit."; exit 0
            fi
            # A33: versions live only in versions.json now (the Svelte app reads it at runtime;
            # no version badges are baked into markup), so that's the only file the bump writes.
            # A30: the source file is static/data/versions.json (served at /data/versions.json).
            git add static/data/versions.json
            git commit -m "chore(release): bump versions [skip ci]"
            if git push; then
              echo "Pushed version bump on attempt $attempt."; exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto latest main and recomputing."
            git reset --hard HEAD~1
            git pull --rebase origin main || true
          done
          echo "::warning::Could not push the version bump after retries. Ensure the github-actions bot can push to main (branch protection), or run scripts/bump-version.mjs in a release PR."
