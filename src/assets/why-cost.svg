<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 132" width="220" height="132" role="img" aria-label="A cost waterfall stepping down from gross PnL through commissions, subscriptions and tax to take-home">
  <style>.mono{font-family:"SF Mono",SFMono-Regular,ui-monospace,Menlo,Consolas,monospace}</style>
  <rect x=".75" y=".75" width="218.5" height="130.5" rx="12" fill="#0d1014" stroke="#262d38" stroke-width="1.5"/>
  <!-- baseline -->
  <line x1="16" y1="104" x2="204" y2="104" stroke="#262d38"/>
  <!-- connectors -->
  <g stroke="#3a4150" stroke-width="1" stroke-dasharray="3 3">
    <line x1="46" y1="36" x2="58" y2="36"/>
    <line x1="80" y1="50" x2="92" y2="50"/>
    <line x1="114" y1="60" x2="126" y2="60"/>
    <line x1="148" y1="60" x2="160" y2="60"/>
    <line x1="148" y1="72" x2="160" y2="72"/>
  </g>
  <!-- gross (full, green) -->
  <rect x="24" y="36" width="22" height="68" fill="rgba(63,185,80,.16)" stroke="#3fb950" stroke-width="1.5"/>
  <!-- commissions (deduction, red) -->
  <rect x="58" y="36" width="22" height="14" fill="rgba(240,74,74,.16)" stroke="#f04a4a" stroke-width="1.5"/>
  <!-- subscriptions (deduction, red) -->
  <rect x="92" y="50" width="22" height="10" fill="rgba(240,74,74,.16)" stroke="#f04a4a" stroke-width="1.5"/>
  <!-- net (running total, blue) -->
  <rect x="126" y="60" width="22" height="44" fill="rgba(106,160,255,.16)" stroke="#6aa0ff" stroke-width="1.5"/>
  <!-- tax (deduction, amber) -->
  <rect x="160" y="60" width="22" height="12" fill="rgba(227,179,65,.16)" stroke="#e3b341" stroke-width="1.5"/>
  <!-- take-home (full, purple) -->
  <rect x="160" y="72" width="22" height="32" fill="rgba(201,139,255,.18)" stroke="#c98bff" stroke-width="1.5"/>
  <!-- labels -->
  <g class="mono" font-size="8" fill="#8a94a3" text-anchor="middle">
    <text x="35" y="118">Gross</text>
    <text x="103" y="118">Costs</text>
    <text x="171" y="118">Take-home</text>
  </g>
</svg>
