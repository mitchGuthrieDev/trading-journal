<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 132" width="220" height="132" role="img" aria-label="Three self-contained static files — HTML, CSS, JS — with no external dependencies, loading instantly">
  <style>.mono{font-family:"SF Mono",SFMono-Regular,ui-monospace,Menlo,Consolas,monospace}</style>
  <rect x=".75" y=".75" width="218.5" height="130.5" rx="12" fill="#0d1014" stroke="#262d38" stroke-width="1.5"/>
  <!-- three static-file glyphs with folded corners -->
  <g>
    <!-- html -->
    <path d="M28,30 h26 l10,10 v44 a3,3 0 0 1 -3,3 h-33 a3,3 0 0 1 -3,-3 v-51 a3,3 0 0 1 3,-3 z" fill="#151a21" stroke="#262d38" stroke-width="1.5"/>
    <path d="M54,30 v10 h10" fill="none" stroke="#262d38" stroke-width="1.5"/>
    <text x="42" y="74" text-anchor="middle" class="mono" font-size="9" fill="#6aa0ff">html</text>
    <!-- css -->
    <path d="M84,30 h26 l10,10 v44 a3,3 0 0 1 -3,3 h-33 a3,3 0 0 1 -3,-3 v-51 a3,3 0 0 1 3,-3 z" fill="#151a21" stroke="#262d38" stroke-width="1.5"/>
    <path d="M110,30 v10 h10" fill="none" stroke="#262d38" stroke-width="1.5"/>
    <text x="98" y="74" text-anchor="middle" class="mono" font-size="9" fill="#c98bff">css</text>
    <!-- js -->
    <path d="M140,30 h26 l10,10 v44 a3,3 0 0 1 -3,3 h-33 a3,3 0 0 1 -3,-3 v-51 a3,3 0 0 1 3,-3 z" fill="#151a21" stroke="#262d38" stroke-width="1.5"/>
    <path d="M166,30 v10 h10" fill="none" stroke="#262d38" stroke-width="1.5"/>
    <text x="154" y="74" text-anchor="middle" class="mono" font-size="9" fill="#e3b341">js</text>
  </g>
  <!-- instant bolt -->
  <path d="M110,86 l-8,14 h7 l-4,12 13,-16 h-7 z" fill="#3fb950" stroke="#3fb950" stroke-width="1" stroke-linejoin="round"/>
  <!-- 0-dependencies pill -->
  <rect x="20" y="100" width="74" height="18" rx="9" fill="#151a21" stroke="#262d38"/>
  <circle cx="33" cy="109" r="4" fill="none" stroke="#3fb950" stroke-width="1.6"/>
  <text x="42" y="112" class="mono" font-size="8.5" fill="#8a94a3">0 deps</text>
  <text x="200" y="112" text-anchor="end" class="mono" font-size="8.5" fill="#767f8c">no build step</text>
</svg>
