<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 132" width="220" height="132" role="img" aria-label="A trading-calendar month grid with green and red daily PnL cells, note dots and a tag chip">
  <style>.mono{font-family:"SF Mono",SFMono-Regular,ui-monospace,Menlo,Consolas,monospace}</style>
  <rect x=".75" y=".75" width="218.5" height="130.5" rx="12" fill="#0d1014" stroke="#262d38" stroke-width="1.5"/>
  <!-- weekday header -->
  <g class="mono" font-size="8" fill="#767f8c" text-anchor="middle">
    <text x="29" y="24">S</text><text x="52" y="24">M</text><text x="75" y="24">T</text><text x="98" y="24">W</text><text x="121" y="24">T</text><text x="144" y="24">F</text><text x="167" y="24">S</text>
  </g>
  <!-- cells: 7 cols x 3 weeks, pitch 23, size 19 -->
  <g fill="#151a21" stroke="#262d38">
    <rect x="19.5" y="30" width="19" height="19" rx="3"/><rect x="42.5" y="30" width="19" height="19" rx="3"/><rect x="65.5" y="30" width="19" height="19" rx="3"/><rect x="88.5" y="30" width="19" height="19" rx="3"/><rect x="111.5" y="30" width="19" height="19" rx="3"/><rect x="134.5" y="30" width="19" height="19" rx="3"/><rect x="157.5" y="30" width="19" height="19" rx="3"/>
    <rect x="19.5" y="53" width="19" height="19" rx="3"/><rect x="42.5" y="53" width="19" height="19" rx="3"/><rect x="65.5" y="53" width="19" height="19" rx="3"/><rect x="88.5" y="53" width="19" height="19" rx="3"/><rect x="111.5" y="53" width="19" height="19" rx="3"/><rect x="134.5" y="53" width="19" height="19" rx="3"/><rect x="157.5" y="53" width="19" height="19" rx="3"/>
    <rect x="19.5" y="76" width="19" height="19" rx="3"/><rect x="42.5" y="76" width="19" height="19" rx="3"/><rect x="65.5" y="76" width="19" height="19" rx="3"/><rect x="88.5" y="76" width="19" height="19" rx="3"/><rect x="111.5" y="76" width="19" height="19" rx="3"/><rect x="134.5" y="76" width="19" height="19" rx="3"/><rect x="157.5" y="76" width="19" height="19" rx="3"/>
  </g>
  <!-- PnL-tinted days -->
  <g>
    <rect x="42.5" y="30" width="19" height="19" rx="3" fill="rgba(63,185,80,.16)" stroke="#3fb950"/>
    <rect x="88.5" y="30" width="19" height="19" rx="3" fill="rgba(240,74,74,.16)" stroke="#f04a4a"/>
    <rect x="134.5" y="30" width="19" height="19" rx="3" fill="rgba(63,185,80,.16)" stroke="#3fb950"/>
    <rect x="65.5" y="53" width="19" height="19" rx="3" fill="rgba(63,185,80,.16)" stroke="#3fb950"/>
    <rect x="111.5" y="53" width="19" height="19" rx="3" fill="rgba(240,74,74,.16)" stroke="#f04a4a"/>
    <rect x="42.5" y="76" width="19" height="19" rx="3" fill="rgba(63,185,80,.16)" stroke="#3fb950"/>
    <rect x="88.5" y="76" width="19" height="19" rx="3" fill="rgba(63,185,80,.16)" stroke="#3fb950"/>
  </g>
  <!-- note dots -->
  <circle cx="57.5" cy="34" r="2.2" fill="#6aa0ff"/>
  <circle cx="126.5" cy="57" r="2.2" fill="#6aa0ff"/>
  <!-- tag chip -->
  <rect x="19.5" y="104" width="48" height="16" rx="8" fill="#151a21" stroke="#262d38"/>
  <circle cx="30" cy="112" r="3" fill="#c98bff"/>
  <text x="38" y="115" class="mono" font-size="8" fill="#8a94a3">#A+</text>
  <text x="167" y="116" text-anchor="end" class="mono" font-size="8" fill="#767f8c">notes · tags · shots</text>
</svg>
