<!doctype html>
<!--
  Blotterbook — DEMO surface (ADR-001 / A33 cutover).

  Hand-authored Svelte 5 mount point — a marker-free shell (partials/ + build-includes were retired).
  data-mode="demo" → the in-memory DemoStore (src/lib/core/demostore.ts), so the HARD "demo never
  persists" invariant holds by construction: nothing is written to IndexedDB or localStorage, and the
  data-writing controls are disabled. The Svelte app lives in src/app/.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <title>Blotterbook — Demo</title>
  </head>
  <body data-mode="demo">
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
