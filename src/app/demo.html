<!doctype html>
<!--
  Blotterbook — DEMO surface (ADR-001 / A33 cutover).

  Hand-authored Svelte 5 mount point. NOT assembled from partials/ (no include markers → build-includes
  skips it). data-mode="demo" → the in-memory DemoStore (app/demostore.js), so the HARD "demo never
  persists" invariant holds by construction: nothing is written to IndexedDB or localStorage, and the
  data-writing controls are disabled. The Svelte app lives in app/staging-svelte/ (dir rename is A30).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../styles/tokens.css" />
    <title>Blotterbook — Demo</title>
  </head>
  <body data-mode="demo">
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
