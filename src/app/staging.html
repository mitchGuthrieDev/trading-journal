<!doctype html>
<!--
  Blotterbook — STAGING surface (ADR-001 / A27 → A33 cutover).

  Hand-authored Svelte 5 mount point, like app/app.html and app/demo.html (all three surfaces are
  now Svelte — the A33 cutover deleted the vanilla view layer). Marker-free shell (partials/ +
  build-includes were retired). The Svelte app lives in src/app/ and reuses
  the pure-logic core (compute/costModel/Store/adapters) verbatim (A29). Staging stays key-gated by
  functions/_middleware.ts and uses an isolated IndexedDB (store.ts keys the DB off data-mode).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- S14: never send a Referer (the launch URL may carry a ?k= admin token); the token is
         also stripped from the address bar on load by the Svelte app. -->
    <meta name="referrer" content="no-referrer" />
    <link rel="stylesheet" href="../styles/tokens.css" />
    <title>Blotterbook — Staging</title>
  </head>
  <body data-mode="staging">
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
