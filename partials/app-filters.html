<!-- ============ filters ============ -->
  <div class="filterbar" id="filterbar">
    <div class="fld"><label for="f_from">From</label><input type="date" id="f_from"></div>
    <div class="fld"><label for="f_to">To</label><input type="date" id="f_to"></div>
    <div class="fld"><label for="f_symbol">Symbol</label><select id="f_symbol"><option value="">All</option></select></div>
    <div class="fld"><label for="f_side">Side</label>
      <select id="f_side"><option value="">All</option><option value="long">Long</option><option value="short">Short</option></select></div>
    <div class="fld"><label for="f_session">Session</label>
      <select id="f_session"><option value="">All</option><option value="rth">RTH (09:30–16:00)</option><option value="eth">ETH (overnight)</option></select></div>
    <div class="fld" style="display:none"><label for="f_tag">Tag</label><select id="f_tag"><option value="">All</option></select></div>
    <div class="fld"><label>Day of week</label>
      <div class="dows" id="f_dows"></div></div>
<!--IF mode=staging-->
    <div class="fld"><label for="f_saved">Saved filter</label>
      <select id="f_saved"><option value="">— Saved filters —</option></select></div>
    <button class="btn" id="f_save" title="Save the current filters as a named view">Save filter</button>
    <button class="btn" id="f_reset" title="Clear all filters">Reset filters</button>
    <span class="fcount fpush" id="f_count"></span>
<!--ENDIF-->
<!--IF mode!=staging-->
    <span class="fcount" id="f_count"></span>
    <button class="btn fbtn" id="f_reset" title="Clear all filters">Reset filters</button>
<!--ENDIF-->
  </div>
